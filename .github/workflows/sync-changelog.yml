name: Sync Changelog

on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - Release
    types:
      - completed

concurrency:
  group: sync-changelog-${{ github.event.workflow_run.id || github.run_id }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  actions: write
  contents: write
  pull-requests: write

jobs:
  sync:
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' ||
        (
          github.event.workflow_run.conclusion == 'success' &&
          github.event.workflow_run.head_branch == 'main'
        )
      }}
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Update changelog in a release branch
        id: changelog
        shell: bash
        run: |
          set -euo pipefail

          RELEASE_TAG="$(gh release list --limit 1 --json tagName --jq '.[0].tagName')"
          RELEASE_BODY="$(gh release view "$RELEASE_TAG" --json body --jq '.body')"

          version="${RELEASE_TAG#v}"
          branch="chore/update-changelog-${RELEASE_TAG}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [[ ! -f CHANGELOG.md ]]; then
            printf '%s\n' \
              '# Changelog' \
              '' \
              'All notable changes to this project will be documented in this file.' \
              > CHANGELOG.md
          fi

          if grep -Fq "## [${version}]" CHANGELOG.md; then
            echo "updated=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          body_file="$(mktemp)"
          printf '%s\n' "$RELEASE_BODY" > "$body_file"

          temp_file="$(mktemp)"
          {
            head -n 3 CHANGELOG.md
            printf '\n'
            cat "$body_file"
            printf '\n\n'
            tail -n +4 CHANGELOG.md
          } > "$temp_file"
          mv "$temp_file" CHANGELOG.md

          git checkout -B "$branch"
          git add CHANGELOG.md

          if git diff --cached --quiet; then
            echo "updated=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git commit -m "docs: update changelog for ${RELEASE_TAG}"
          git push -u origin "$branch" --force-with-lease

          echo "updated=true" >> "$GITHUB_OUTPUT"
          echo "branch=$branch" >> "$GITHUB_OUTPUT"

      - name: Open changelog pull request
        if: steps.changelog.outputs.updated == 'true'
        shell: bash
        run: |
          RELEASE_TAG="$(gh release list --limit 1 --json tagName --jq '.[0].tagName')"

          if gh pr list --base main --head "${{ steps.changelog.outputs.branch }}" --state open --json number --jq 'length > 0' | grep -q true; then
            exit 0
          fi

          gh pr create \
            --base main \
            --head "${{ steps.changelog.outputs.branch }}" \
            --title "docs: update changelog for ${RELEASE_TAG}" \
            --body "This PR syncs CHANGELOG.md with the published GitHub Release ${RELEASE_TAG}."

      - name: Trigger CI for changelog branch
        if: steps.changelog.outputs.updated == 'true'
        shell: bash
        run: |
          gh workflow run CI \
            --ref "${{ steps.changelog.outputs.branch }}"
